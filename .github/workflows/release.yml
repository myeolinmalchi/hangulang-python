name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  wheels:
    name: Build wheel ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            target: x86_64
            args: --release --out dist -i python3.10 --compatibility pypi
          - os: ubuntu-latest
            python-version: "3.11"
            target: x86_64
            args: --release --out dist -i python3.11 --compatibility pypi
          - os: ubuntu-latest
            python-version: "3.12"
            target: x86_64
            args: --release --out dist -i python3.12 --compatibility pypi
          - os: ubuntu-latest
            python-version: "3.13"
            target: x86_64
            args: --release --out dist -i python3.13 --compatibility pypi
          - os: macos-13
            python-version: "3.10"
            target: x86_64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-13
            python-version: "3.11"
            target: x86_64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-13
            python-version: "3.12"
            target: x86_64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-13
            python-version: "3.13"
            target: x86_64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-14
            python-version: "3.10"
            target: aarch64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-14
            python-version: "3.11"
            target: aarch64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-14
            python-version: "3.12"
            target: aarch64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: macos-14
            python-version: "3.13"
            target: aarch64-apple-darwin
            args: --release --out dist --interpreter python --compatibility pypi
          - os: windows-latest
            python-version: "3.10"
            target: x86_64-pc-windows-msvc
            args: --release --out dist --interpreter python --compatibility pypi
          - os: windows-latest
            python-version: "3.11"
            target: x86_64-pc-windows-msvc
            args: --release --out dist --interpreter python --compatibility pypi
          - os: windows-latest
            python-version: "3.12"
            target: x86_64-pc-windows-msvc
            args: --release --out dist --interpreter python --compatibility pypi
          - os: windows-latest
            python-version: "3.13"
            target: x86_64-pc-windows-msvc
            args: --release --out dist --interpreter python --compatibility pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: ${{ matrix.args }}
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [sdist, wheels]
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
